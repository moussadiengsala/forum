{{define "aside"}}
<aside class="bg-second flex flex-col p-4 w-full border-b-2
    md:absolute md:inset-y-0 z-[99] md:w-24 md:border-r-2 md:border-b-0 border-gray-500/20 md:justify-center md:items-center
    xl:w-72">
    <div class="w-fit flex items-center justify-center
        md:h-24 md:w-full xl:justify-start space-x-3">
        <button id="menu-button">
            <img src="static/assets/logoipsum-296.svg" alt="">
        </button>
        <span class="md:hidden xl:block font-bold text-sky-500 text-2xl">DiwaneGui</span>
    </div>
    <div id="menu-modal" class="bg-second w-3/4 absolute inset-y-0 -left-full z-[9999] transition-all ease-in-out
        md:w-full md:relative md:left-0 md:grow md:flex flex-col">
        <button id="menu-close" class="absolute top-4 right-4 md:hidden">
            <span>close</span>
        </button>
        <div class="flex flex-col-reverse justify-start mt-14 p-6 grow md:p-0 md:mt-0 md:flex-col md:items-center xl:justify-start">
            <ul class="space-y-2 mt-4">
                
                <li class="flex bg-gray-500/10 rounded-md border-2 border-gray-500/20
                    md:border-0 md:bg-transparent md:rounded-none
                    xl:border-2 xl:bg-gray-500/10 xl:rounded-md">
                    <button class="p-2">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5">
                            <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z" clip-rule="evenodd" />
                        </svg>                                
                    </button>
                    <input type="search" name="search" id="search" placeholder="Explore Diwane gui..." class="md:hidden xl:block bg-transparent outline-none p-2 w-full">
                </li>
                <li class="flex">
                    <a href="/" class="p-2 flex justify-center items-center space-x-2">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5">
                            <path d="M10 8a3 3 0 100-6 3 3 0 000 6zM3.465 14.493a1.23 1.23 0 00.41 1.412A9.957 9.957 0 0010 18c2.31 0 4.438-.784 6.131-2.1.43-.333.604-.903.408-1.41a7.002 7.002 0 00-13.074.003z" />
                        </svg>
                        <span class="md:hidden xl:block">Profile</span>                               
                    </a>
                </li>
                <li class="flex">
                    <a href="/" class="p-2 flex justify-center items-center space-x-2">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5">
                            <path d="M10 9a3 3 0 100-6 3 3 0 000 6zM6 8a2 2 0 11-4 0 2 2 0 014 0zM1.49 15.326a.78.78 0 01-.358-.442 3 3 0 014.308-3.516 6.484 6.484 0 00-1.905 3.959c-.023.222-.014.442.025.654a4.97 4.97 0 01-2.07-.655zM16.44 15.98a4.97 4.97 0 002.07-.654.78.78 0 00.357-.442 3 3 0 00-4.308-3.517 6.484 6.484 0 011.907 3.96 2.32 2.32 0 01-.026.654zM18 8a2 2 0 11-4 0 2 2 0 014 0zM5.304 16.19a.844.844 0 01-.277-.71 5 5 0 019.947 0 .843.843 0 01-.277.71A6.975 6.975 0 0110 18a6.974 6.974 0 01-4.696-1.81z" />
                        </svg>    
                        <span class="md:hidden xl:block">Community</span>                              
                    </a>
                </li>
                <li class="flex">
                    <a href="/" class="p-2 flex justify-center items-center space-x-2">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="w-5 h-5">
                            <path fill-rule="evenodd" d="M2 3.5A1.5 1.5 0 013.5 2h9A1.5 1.5 0 0114 3.5v11.75A2.75 2.75 0 0016.75 18h-12A2.75 2.75 0 012 15.25V3.5zm3.75 7a.75.75 0 000 1.5h4.5a.75.75 0 000-1.5h-4.5zm0 3a.75.75 0 000 1.5h4.5a.75.75 0 000-1.5h-4.5zM5 5.75A.75.75 0 015.75 5h4.5a.75.75 0 01.75.75v2.5a.75.75 0 01-.75.75h-4.5A.75.75 0 015 8.25v-2.5z" clip-rule="evenodd" />
                            <path d="M16.5 6.5h-1v8.75a1.25 1.25 0 102.5 0V8a1.5 1.5 0 00-1.5-1.5z" />
                        </svg>   
                        <span class="md:hidden xl:block">News Feed</span>                               
                    </a>
                </li>
            </ul>
            <div class="mt-auto xl:hidden">
                <div class="bg-gray-500 rounded-full w-8 h-8 text-center">M</div>
            </div>
        </div>
    </div>
</aside>
{{end}}
